<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">

<title>JB Workout</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0a0a'/><rect x='10' y='44' width='80' height='12' rx='6' fill='%2360a5fa'/><rect x='6' y='34' width='12' height='32' rx='5' fill='%2360a5fa'/><rect x='82' y='34' width='12' height='32' rx='5' fill='%2360a5fa'/><rect x='0' y='40' width='9' height='20' rx='4' fill='%2360a5fa'/><rect x='91' y='40' width='9' height='20' rx='4' fill='%2360a5fa'/></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif; min-height: 100vh; overscroll-behavior: none; }
body { padding-bottom: env(safe-area-inset-bottom); }
svg.icon { display: inline-block; vertical-align: middle; flex-shrink: 0; }
.app { max-width: 480px; margin: 0 auto; padding: max(20px, env(safe-area-inset-top)) 0 100px; min-height: 100vh; }

.top-bar { padding: 12px 20px 0; display: flex; justify-content: space-between; align-items: center; }
.jb-logo { display: flex; align-items: center; gap: 10px; }
.jb-logo-icon { width: 36px; height: 36px; background: #0f2a4a; border-radius: 9px; display: flex; align-items: center; justify-content: center; border: 0.5px solid #1a4a7a; }
.jb-logo-text { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 2px; }
.jb-logo-text span { color: #60a5fa; }
.reset-btn { background: none; border: none; color: #444; cursor: pointer; padding: 6px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
.reset-btn:active { color: #666; }

.today-label { padding: 18px 20px 4px; font-size: 13px; color: #666; display: flex; align-items: center; gap: 6px; font-weight: 500; }
.day-tabs { display: flex; overflow-x: auto; padding: 8px 20px 0; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab { flex-shrink: 0; padding: 8px 16px 14px 0; font-size: 28px; font-weight: 800; color: #2a2a2a; cursor: pointer; transition: color 0.2s; white-space: nowrap; background: none; border: none; font-family: inherit; }
.day-tab.active { color: #fff; }
.day-meta { padding: 4px 20px 16px; font-size: 13px; color: #666; display: flex; gap: 16px; }
.day-meta-item { display: flex; align-items: center; gap: 6px; font-weight: 500; }

.workout-sections { display: flex; flex-direction: column; gap: 10px; padding: 0 16px; }

.equipment-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 16px; background: #0f2a4a; border-radius: 12px; border: 0.5px solid #1a4a7a; }
.equip-label { flex: 1; }
.equip-name { font-size: 13px; font-weight: 700; color: #60a5fa; letter-spacing: 0.8px; text-transform: uppercase; }
.equip-count { font-size: 11px; color: #3a6a9a; margin-top: 1px; font-weight: 500; }
.equip-done-badge { font-size: 11px; font-weight: 600; color: #1D9E75; background: rgba(29,158,117,0.15); border: 0.5px solid rgba(29,158,117,0.3); padding: 3px 9px; border-radius: 10px; }

.ex-group { background: #111; border-radius: 14px; overflow: hidden; border: 0.5px solid #1e1e1e; }
.ex-card { background: #111; padding: 14px; border-bottom: 0.5px solid #1a1a1a; }
.ex-card:last-child { border-bottom: none; }
.ex-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.ex-icon-btn { width: 42px; height: 42px; border-radius: 11px; background: #0f2a4a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; text-decoration: none; border: 0.5px solid #1a4a7a; }
.ex-icon-btn:active { background: #1a3a5a; }
.ex-main { flex: 1; min-width: 0; }
.ex-name-row { display: flex; align-items: center; gap: 7px; }
.ex-name { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.2; }
.video-btn { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; background: #1a3a5a; flex-shrink: 0; text-decoration: none; border: 0.5px solid #2a4a6a; }
.video-btn:active { background: #2a4a6a; }
.ex-badge { flex-shrink: 0; display: flex; align-items: center; gap: 4px; background: #1D9E75; color: #d4f5e9; font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 20px; white-space: nowrap; }
.ex-badge.zero { background: #1a1a1a; color: #555; border: 0.5px solid #252525; }

.sets-list { display: flex; flex-direction: column; gap: 4px; margin-top: 12px; }
.set-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
.set-num { font-size: 10px; color: #444; width: 38px; flex-shrink: 0; font-weight: 700; letter-spacing: 0.4px; }
.set-check { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #2a2a2a; background: transparent; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.set-check:active { transform: scale(0.88); }
.set-check.done { background: #1D9E75; border-color: #1D9E75; }
.set-fields { display: flex; gap: 6px; flex: 1; }
.field-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.field-label { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; }
.field-val { font-size: 14px; color: #fff; background: #0d0d0d; border: 0.5px solid #222; border-radius: 7px; padding: 7px 6px; width: 100%; text-align: center; font-family: inherit; -moz-appearance: textfield; font-weight: 500; }
.field-val::-webkit-outer-spin-button, .field-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.field-val:focus { outline: none; border-color: #60a5fa; background: #0a1525; }
.field-val.readonly { pointer-events: none; border-color: transparent; background: transparent; }
.ex-progress { margin-top: 10px; height: 3px; background: #1e1e1e; border-radius: 2px; overflow: hidden; }
.ex-progress-fill { height: 100%; background: #1D9E75; border-radius: 2px; transition: width 0.4s ease; }
.ex-completed-banner { margin-top: 9px; font-size: 12px; color: #1D9E75; font-weight: 600; display: flex; align-items: center; gap: 5px; }

.actions { padding: 20px 16px 0; display: flex; flex-direction: column; gap: 10px; }
.btn { width: 100%; padding: 16px; border-radius: 50px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn:active { transform: scale(0.97); opacity: 0.88; }
.btn-primary { background: #60a5fa; color: #000; }
.btn-success { background: #1D9E75; color: #fff; }
.btn-danger { background: #1f1010; color: #f87171; border: 0.5px solid #3a1a1a; }
.btn-ghost { background: #161616; color: #aaa; border: 0.5px solid #222; }

.edit-toggle { display: flex; justify-content: center; padding: 16px; }
.edit-btn { background: #141414; border: 0.5px solid #222; font-size: 13px; color: #777; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 20px; font-family: inherit; font-weight: 600; }
.edit-btn.active { background: #0f2a4a; color: #60a5fa; border-color: #1a4a7a; }

.session-banner { margin: 0 0 12px; padding: 11px 14px; background: rgba(96,165,250,0.08); border: 0.5px solid rgba(96,165,250,0.2); border-radius: 10px; font-size: 13px; color: #60a5fa; display: flex; align-items: center; gap: 9px; font-weight: 500; }
.pulse-dot { width: 7px; height: 7px; border-radius: 50%; animation: pulse 1.5s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
.modal-backdrop.open { display: flex; }
.modal { background: #141414; border-radius: 20px 20px 0 0; padding: 28px 20px max(28px, env(safe-area-inset-bottom)); width: 100%; border-top: 0.5px solid #222; }
.modal-icon { display: flex; justify-content: center; margin-bottom: 12px; }
.modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; text-align: center; }
.modal p { font-size: 14px; color: #777; margin-bottom: 24px; line-height: 1.6; text-align: center; }
.modal-actions { display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="jb-logo">
      <div class="jb-logo-icon">
        <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="10.5" width="20" height="3" rx="1.5" fill="#60a5fa"/>
          <rect x="1" y="7" width="3.5" height="10" rx="1.75" fill="#60a5fa"/>
          <rect x="19.5" y="7" width="3.5" height="10" rx="1.75" fill="#60a5fa"/>
          <rect x="0" y="9" width="2.5" height="6" rx="1.25" fill="#60a5fa"/>
          <rect x="21.5" y="9" width="2.5" height="6" rx="1.25" fill="#60a5fa"/>
        </svg>
      </div>
      <div class="jb-logo-text">J<span>B</span></div>
    </div>
    <button class="reset-btn" onclick="openReset()">
      <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M4 4v5h5M20 20v-5h-5" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 9A8 8 0 0 0 5.7 5.7L4 9M4 15a8 8 0 0 0 14.3 3.3L20 15" stroke="#555" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="today-label" id="today-label"></div>
  <div class="day-tabs" id="day-tabs"></div>
  <div class="day-meta" id="day-meta"></div>
  <div class="workout-sections" id="workout-sections"></div>
  <div class="edit-toggle">
    <button class="edit-btn" id="edit-btn" onclick="toggleEdit()">
      <svg class="icon" width="15" height="15" viewBox="0 0 24 24" fill="none">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Edit
    </button>
  </div>
  <div class="actions" id="actions"></div>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-icon" id="modal-icon"></div>
    <h3 id="modal-title"></h3>
    <p id="modal-body"></p>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

  rackIcon:    `<svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="2" width="3" height="20" rx="1.5" fill="#60a5fa"/><rect x="18" y="2" width="3" height="20" rx="1.5" fill="#60a5fa"/><rect x="3" y="9" width="18" height="3" rx="1.5" fill="#60a5fa" opacity="0.5"/><rect x="1" y="10" width="5" height="7" rx="1" fill="#60a5fa" opacity="0.3"/><rect x="18" y="10" width="5" height="7" rx="1" fill="#60a5fa" opacity="0.3"/></svg>`,
  cableIcon:   `<svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" fill="#60a5fa"/><line x1="12" y1="2" x2="12" y2="9" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/><line x1="12" y1="15" x2="12" y2="22" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/><line x1="2" y1="12" x2="9" y2="12" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/><line x1="15" y1="12" x2="22" y2="12" stroke="#60a5fa" stroke-width="2.5" stroke-linecap="round"/></svg>`,
  machineIcon: `<svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="3" stroke="#60a5fa" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="3.5" stroke="#60a5fa" stroke-width="2" fill="none"/><circle cx="12" cy="12" r="1" fill="#60a5fa"/></svg>`,
  floorIcon:   `<svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="2.5" fill="#60a5fa"/><path d="M8 10h8l-1 6H9L8 10z" fill="#60a5fa"/><path d="M9 16l-2 5M15 16l2 5" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/><path d="M8 10l-3 4M16 10l3 4" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/></svg>`,
};

// Equipment groups define the order and grouping for each day
// Each group: { equipment, label, icon, exercises: [...] }
const WORKOUTS = [
  { day:1, label:"Day 1", est:50, groups:[
    { equipment:"bench", label:"Bench", icon:"benchIcon", exercises:[
      {id:"BBP",  name:"Barbell Bench Press",               sets:3, reps:8,  weight:135, unit:"lbs", icon:"barbell"},
      {id:"DRD",  name:"Dumbbell Romanian Deadlift",        sets:3, reps:10, weight:50,  unit:"lbs", icon:"dumbbell"},
      {id:"SDIC", name:"Seated Dumbbell Incline Curl",      sets:3, reps:10, weight:20,  unit:"lbs", icon:"dumbbell"},
    ]},
    { equipment:"cable", label:"Cable Station", icon:"cableIcon", exercises:[
      {id:"COTR", name:"Cable Overhead Triceps Ext (Rope)", sets:3, reps:12, weight:40,  unit:"lbs", icon:"cable"},
    ]},
    { equipment:"floor", label:"Open Floor", icon:"floorIcon", exercises:[
      {id:"WL",   name:"Walking Lunge",                     sets:3, reps:16, weight:0,   unit:"BW",  icon:"body"},
    ]},
  ]},
  { day:2, label:"Day 2", est:62, groups:[
    { equipment:"bench", label:"Bench", icon:"benchIcon", exercises:[
      {id:"DIB",  name:"Dumbbell Incline Bench Press",      sets:4, reps:6,  weight:50,  unit:"lbs", icon:"dumbbell"},
    ]},
    { equipment:"rack", label:"Squat Rack", icon:"rackIcon", exercises:[
      {id:"PR",   name:"Pendlay Row",                       sets:3, reps:15, weight:95,  unit:"lbs", icon:"barbell"},
    ]},
    { equipment:"machine", label:"Machine Area", icon:"machineIcon", exercises:[
      {id:"PDCF", name:"Pec Deck Chest Fly",                sets:3, reps:10, weight:70,  unit:"lbs", icon:"machine"},
      {id:"MLP",  name:"Machine Lat Pullover",              sets:3, reps:10, weight:60,  unit:"lbs", icon:"machine"},
      {id:"MSC",  name:"Machine Seated Crunch",             sets:3, reps:20, weight:50,  unit:"lbs", icon:"machine"},
    ]},
  ]},
  { day:3, label:"Day 3", est:58, groups:[
    { equipment:"rack", label:"Squat Rack", icon:"rackIcon", exercises:[
      {id:"BSS",  name:"Barbell Sumo Squat",                sets:4, reps:8,  weight:135, unit:"lbs", icon:"barbell"},
    ]},
    { equipment:"machine", label:"Machine Area", icon:"machineIcon", exercises:[
      {id:"MLR",  name:"Machine Lateral Raise",             sets:4, reps:15, weight:40,  unit:"lbs", icon:"machine"},
      {id:"MSLE", name:"Machine Seated Leg Extension",      sets:4, reps:12, weight:70,  unit:"lbs", icon:"machine"},
    ]},
    { equipment:"bench", label:"Bench", icon:"benchIcon", exercises:[
      {id:"DHC",  name:"Dumbbell Hammer Curl",              sets:4, reps:8,  weight:30,  unit:"lbs", icon:"dumbbell"},
    ]},
    { equipment:"cable", label:"Cable Station", icon:"cableIcon", exercises:[
      {id:"COTR3",name:"Cable Overhead Triceps Ext (Rope)", sets:4, reps:10, weight:35,  unit:"lbs", icon:"cable"},
    ]},
  ]},
  { day:4, label:"Day 4", est:52, groups:[
    { equipment:"cable", label:"Cable Station", icon:"cableIcon", exercises:[
      {id:"CCGLP",name:"Cable Close-Grip Lat Pulldown",     sets:4, reps:8,  weight:80,  unit:"lbs", icon:"cable"},
      {id:"CKC",  name:"Cable Kneeling Crunch",             sets:4, reps:10, weight:40,  unit:"lbs", icon:"cable"},
    ]},
    { equipment:"bench", label:"Bench", icon:"benchIcon", exercises:[
      {id:"BBP4", name:"Barbell Bench Press",               sets:4, reps:9,  weight:135, unit:"lbs", icon:"barbell"},
      {id:"DIRLR",name:"Dumbbell Incline Rear Lateral Raise",sets:3,reps:8,  weight:15,  unit:"lbs", icon:"dumbbell"},
    ]},
    { equipment:"machine", label:"Machine Area", icon:"machineIcon", exercises:[
      {id:"MSCR", name:"Machine Standing Calf Raise",       sets:3, reps:10, weight:165, unit:"lbs", icon:"machine"},
    ]},
  ]},
];

// Flatten all exercises for session indexing
function flattenExercises(day) {
  return day.groups.flatMap(g => g.exercises);
}

const KEY  = 'jb_workout_v3';
const load = () => { try { return JSON.parse(localStorage.getItem(KEY)||'{}'); } catch(e) { return {}; } };
const save = () => { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {} };

let state = load();
if (!state.currentDay) state.currentDay = 1;
if (!state.weights)    state.weights    = {};
if (!state.session)    state.session    = null;

let activeDay = state.currentDay;
let editMode  = false;

const getW      = (id, def) => state.weights[id] !== undefined ? state.weights[id] : def;
const getInc    = (id, def) => getW(id, def) - def;
const vidUrl    = name => `https://www.youtube.com/results?search_query=${encodeURIComponent(name+' exercise proper form')}`;
const initSess  = idx => flattenExercises(WORKOUTS[idx]).map(ex => ({
  exId: ex.id,
  sets: Array.from({length: ex.sets}, () => ({reps: ex.reps, weight: getW(ex.id, ex.weight), done: false}))
}));
const getSess    = () => (state.session && state.session.dayIndex === activeDay-1) ? state.session.data : null;
const sessActive = () => state.session !== null;

// Build a flat index map: exId -> session index
function buildExIndex(dayIdx) {
  const map = {};
  flattenExercises(WORKOUTS[dayIdx]).forEach((ex, i) => { map[ex.id] = i; });
  return map;
}

function render() { renderTabs(); renderMeta(); renderSections(); renderButtons(); }

function renderTabs() {
  document.getElementById('day-tabs').innerHTML = WORKOUTS.map(w =>
    `<button class="day-tab ${w.day===activeDay?'active':''}" onclick="switchDay(${w.day})">${w.label}</button>`
  ).join('');
  const lbl = document.getElementById('today-label');
  lbl.innerHTML = activeDay === state.currentDay
    ? `${ICONS.today} Today's workout`
    : `${ICONS.calendar} Previewing ${WORKOUTS[activeDay-1].label}`;
}

function renderMeta() {
  const w     = WORKOUTS[activeDay-1];
  const total = flattenExercises(w).length;
  document.getElementById('day-meta').innerHTML = `
    <span class="day-meta-item">${ICONS.bbsmall} ${total} exercises</span>
    <span class="day-meta-item">${ICONS.time} ${w.est} minutes</span>
  `;
}

function renderSections() {
  const w       = WORKOUTS[activeDay-1];
  const sess    = getSess();
  const exIndex = buildExIndex(activeDay-1);
  let bannerHtml = '';

  if (sessActive() && state.session.dayIndex === activeDay-1) {
    bannerHtml = `<div class="session-banner"><div class="pulse-dot" style="background:#60a5fa;"></div>Workout in progress</div>`;
  } else if (sessActive()) {
    bannerHtml = `<div class="session-banner" style="background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.2);color:#fbbf24;"><div class="pulse-dot" style="background:#fbbf24;"></div>Active session on ${WORKOUTS[state.session.dayIndex].label}</div>`;
  }

  const sectionsHtml = w.groups.map(group => {
    // Check if all exercises in this group are done
    let groupDone = false;
    if (sess) {
      groupDone = group.exercises.every(ex => {
        const ei = exIndex[ex.id];
        return sess[ei].sets.every(s => s.done);
      });
    }

    const headerHtml = `
      <div class="equipment-header">
        <div class="equip-label">
          <div class="equip-name">${group.label}</div>
          <div class="equip-count">${group.exercises.length} exercise${group.exercises.length>1?'s':''}</div>
        </div>
        ${sess && groupDone ? `<div class="equip-done-badge">${ICONS.checkCircle} Done</div>` : ''}
      </div>
    `;

    const exercisesHtml = group.exercises.map(ex => {
      const ei    = exIndex[ex.id];
      const curW  = getW(ex.id, ex.weight);
      const inc   = getInc(ex.id, ex.weight);
      const isBW  = ex.unit === 'BW';
      const badgeLabel = isBW ? 'Bodyweight' : (inc > 0 ? `+${inc}lbs` : `${curW}lbs`);
      const badgeIcon  = inc > 0 ? ICONS.trendUp : '';

      let setsHtml = '';
      if (sess) {
        const exS       = sess[ei];
        const doneCount = exS.sets.filter(s => s.done).length;
        const pct       = (doneCount / exS.sets.length) * 100;
        const allDone   = doneCount === exS.sets.length;
        setsHtml = `
          <div class="sets-list">
            ${exS.sets.map((s, si) => `
              <div class="set-row">
                <span class="set-num">SET ${si+1}</span>
                <div class="set-check ${s.done?'done':''}" onclick="toggleSet(${ei},${si})">
                  ${s.done ? ICONS.check : ''}
                </div>
                <div class="set-fields">
                  <div class="field-wrap">
                    <div class="field-label">Reps</div>
                    <input class="field-val ${editMode?'':'readonly'}" type="number" inputmode="numeric" value="${s.reps}" onchange="updateSet(${ei},${si},'reps',this.value)">
                  </div>
                  <div class="field-wrap">
                    <div class="field-label">${isBW?'':'Weight'}</div>
                    <input class="field-val ${editMode?'':'readonly'}" type="number" inputmode="decimal" value="${isBW?'':s.weight}" ${isBW?'placeholder="BW" disabled':''} onchange="updateSet(${ei},${si},'weight',this.value)">
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
          <div class="ex-progress"><div class="ex-progress-fill" style="width:${pct}%"></div></div>
          ${allDone ? `<div class="ex-completed-banner">${ICONS.checkCircle} Complete — weight bumped next session</div>` : ''}
        `;
      } else {
        setsHtml = `<div style="font-size:12px;color:#444;margin-top:5px;margin-left:52px;">${ex.sets} sets &times; ${ex.reps} reps${!isBW?` @ ${curW}lbs`:''}</div>`;
      }

      return `
        <div class="ex-card">
          <div class="ex-header">
            <a class="ex-icon-btn" href="${vidUrl(ex.name)}" target="_blank" rel="noopener">${ICONS[ex.icon]}</a>
            <div class="ex-main">
              <div class="ex-name-row">
                <span class="ex-name">${ex.name}</span>
                <a class="video-btn" href="${vidUrl(ex.name)}" target="_blank" rel="noopener">${ICONS.play}</a>
              </div>
            </div>
            <div class="ex-badge ${isBW?'zero':''}">${badgeIcon}${badgeLabel}</div>
          </div>
          ${setsHtml}
        </div>
      `;
    }).join('');

    return `${headerHtml}<div class="ex-group">${exercisesHtml}</div>`;
  }).join('');

  document.getElementById('workout-sections').innerHTML = bannerHtml + sectionsHtml;
}

function renderButtons() {
  const sess = getSess();
  const c    = document.getElementById('actions');
  if (!sess && !sessActive()) {
    c.innerHTML = `<button class="btn btn-primary" onclick="startWorkout()">${ICONS.playCircle} Start workout</button>`;
  } else if (!sess && sessActive()) {
    c.innerHTML = `<button class="btn btn-ghost" onclick="switchDay(${state.session.dayIndex+1})">${ICONS.undo} Resume ${WORKOUTS[state.session.dayIndex].label}</button>`;
  } else {
    const allDone = state.session.data.every(ex => ex.sets.every(s => s.done));
    c.innerHTML = `
      <button class="btn ${allDone?'btn-success':'btn-primary'}" onclick="confirmFinish()">
        ${allDone ? ICONS.checkCircleLg : ICONS.flag}
        ${allDone ? 'Finish & advance to next day' : 'Finish workout'}
      </button>
      <button class="btn btn-danger" onclick="confirmEndEarly()">${ICONS.closeCircle} End workout early</button>
    `;
  }
}

function switchDay(day) { activeDay = day; render(); }

function startWorkout() {
  if (sessActive()) return;
  state.session = {dayIndex: activeDay-1, data: initSess(activeDay-1), startedAt: Date.now()};
  save(); render();
}

function toggleSet(ei, si) {
  const s = getSess(); if (!s) return;
  s[ei].sets[si].done = !s[ei].sets[si].done;
  save(); render();
}

function updateSet(ei, si, field, val) {
  const s = getSess(); if (!s) return;
  s[ei].sets[si][field] = parseFloat(val) || 0;
  save();
}

function toggleEdit() {
  editMode = !editMode;
  const b = document.getElementById('edit-btn');
  b.innerHTML = editMode
    ? `${ICONS.closeCircle.replace('rgba(248,113,113,0.2)','rgba(96,165,250,0.2)').replace('#f87171','#60a5fa')} Done editing`
    : `<svg class="icon" width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Edit`;
  b.classList.toggle('active', editMode);
  render();
}

function confirmFinish() {
  const sess = getSess(); if (!sess) return;
  const w      = WORKOUTS[activeDay-1];
  const flat   = flattenExercises(w);
  const bumped = flat.filter((ex, ei) => sess[ei].sets.every(s=>s.done) && ex.unit!=='BW').map(ex=>ex.name);
  const msg    = bumped.length > 0
    ? `+5lbs applied next session: ${bumped.join(', ')}.`
    : 'No exercises fully completed — no weight increases this time.';
  openModal({
    icon: ICONS.trophy,
    title: 'Finish workout?',
    body: `${msg} You'll advance to ${WORKOUTS[activeDay%4].label} next.`,
    actions: [
      {label:'Finish & save', cls:'btn-success', icon: ICONS.checkCircleLg, fn: finishWorkout},
      {label:'Cancel',        cls:'btn-ghost',   icon: ICONS.back,          fn: closeModal}
    ]
  });
}

function finishWorkout() {
  const sess = getSess(); if (!sess) return closeModal();
  const flat = flattenExercises(WORKOUTS[activeDay-1]);
  flat.forEach((ex, ei) => {
    if (sess[ei].sets.every(s=>s.done) && ex.unit!=='BW')
      state.weights[ex.id] = getW(ex.id, ex.weight) + 5;
  });
  state.session    = null;
  state.currentDay = (activeDay % 4) + 1;
  activeDay        = state.currentDay;
  save(); closeModal(); render();
}

function confirmEndEarly() {
  openModal({
    icon: ICONS.warning,
    title: 'End workout early?',
    body: 'This session will be discarded. No weights will increase and you will stay on the same day.',
    actions: [
      {label:'Yes, end workout', cls:'btn-danger', icon: ICONS.closeCircle, fn: endEarly},
      {label:'Keep going',       cls:'btn-ghost',  icon: ICONS.back,        fn: closeModal}
    ]
  });
}

function endEarly() { state.session = null; save(); closeModal(); render(); }

function openReset() {
  openModal({
    icon: ICONS.refresh,
    title: 'Reset all progress?',
    body: 'All weight increases will be cleared and every exercise returns to its original starting weight. This cannot be undone.',
    actions: [
      {label:'Reset everything', cls:'btn-danger', icon: ICONS.trash, fn: resetAll},
      {label:'Cancel',           cls:'btn-ghost',  icon: ICONS.back,  fn: closeModal}
    ]
  });
}

function resetAll() {
  state = {currentDay:1, weights:{}, session:null};
  activeDay = 1;
  save(); closeModal(); render();
}

function openModal({icon, title, body, actions}) {
  document.getElementById('modal-icon').innerHTML    = icon || '';
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = body;
  const c = document.getElementById('modal-actions');
  c.innerHTML = '';
  actions.forEach(a => {
    const b = document.createElement('button');
    b.className = `btn ${a.cls}`;
    b.innerHTML = `${a.icon}${a.label}`;
    b.onclick   = a.fn;
    c.appendChild(b);
  });
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target.id==='modal') closeModal(); });

render();
</script>
</body>
</html>
