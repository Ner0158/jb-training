<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:           #0a0a0a;
  --bg-card:      #141414;
  --bg-card-2:    #1a1a1a;
  --green:        #7FFF6B;
  --green-dim:    #4FA040;
  --green-bg:     #1a3010;
  --purple:       #5B3FF0;
  --purple-light: #7B5FFF;
  --purple-bg:    #1a0d3a;
  --purple-dim:   #3a2580;
  --text:         #fff;
  --text-muted:   #888;
  --text-faint:   #555;
  --border:       #2a2a2a;
  --border-bold:  #fff;
  --danger:       #ff5555;
  --danger-bg:    #2a0a0a;
}

html, body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', monospace; min-height: 100vh; overscroll-behavior: none; }
body { padding-bottom: env(safe-area-inset-bottom); }

.pixel { font-family: 'Pixelify Sans', monospace; letter-spacing: 0.5px; }
svg.icon { display: inline-block; vertical-align: middle; flex-shrink: 0; image-rendering: pixelated; }

.app { max-width: 480px; margin: 0 auto; padding: max(20px, env(safe-area-inset-top)) 0 100px; min-height: 100vh; }

/* ── Top bar ── */
.top-bar { padding: 12px 20px 8px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); margin-bottom: 4px; }
.jb-logo { display: flex; align-items: center; gap: 12px; }
.jb-logo-icon { width: 44px; height: 44px; background: var(--bg); border: 3px solid var(--green); display: flex; align-items: center; justify-content: center; }
.jb-logo-text { font-family: 'Pixelify Sans', monospace; font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: 2px; line-height: 1; }
.jb-logo-text span { color: var(--green); }
.reset-btn { background: var(--bg-card); border: 2px solid var(--border); color: var(--text-muted); cursor: pointer; padding: 10px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; min-width: 48px; min-height: 48px; }
.reset-btn:active { background: var(--purple-bg); border-color: var(--purple); color: var(--purple-light); transform: rotate(45deg); }

/* ── Today label ── */
.today-label { padding: 16px 20px 4px; font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

/* ── Day tabs ── */
.day-tabs { display: flex; overflow-x: auto; padding: 4px 20px 0; scrollbar-width: none; -webkit-overflow-scrolling: touch; gap: 4px; }
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab { flex-shrink: 0; padding: 10px 16px; font-family: 'Pixelify Sans', monospace; font-size: 26px; font-weight: 700; color: var(--text-faint); cursor: pointer; transition: all 0.15s; white-space: nowrap; background: transparent; border: 2px solid transparent; min-height: 48px; letter-spacing: 1px; }
.day-tab.active { color: var(--text); background: var(--green); color: var(--bg); border-color: var(--green); }
.day-tab:not(.active):active { transform: translate(2px, 2px); }

/* ── Day meta ── */
.day-meta { padding: 12px 20px 16px; font-size: 12px; color: var(--text-muted); display: flex; gap: 16px; font-weight: 600; }
.day-meta-item { display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Sections wrapper ── */
.workout-sections { display: flex; flex-direction: column; gap: 12px; padding: 0 16px; }

/* ── Equipment header ── */
.equipment-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 16px; background: var(--purple); border: 3px solid var(--purple); transition: all 0.4s; box-shadow: 4px 4px 0 0 var(--purple-dim); }
.equipment-header.group-done { background: var(--green); border-color: var(--green); box-shadow: 4px 4px 0 0 var(--green-dim); }
.equip-label { flex: 1; }
.equip-name { font-family: 'Pixelify Sans', monospace; font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 1.5px; text-transform: uppercase; line-height: 1; transition: color 0.4s; }
.equipment-header.group-done .equip-name { color: var(--bg); }
.equip-count { font-size: 10px; color: rgba(255,255,255,0.65); margin-top: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: color 0.4s; }
.equipment-header.group-done .equip-count { color: rgba(0,0,0,0.6); }
.equip-done-badge { font-family: 'Pixelify Sans', monospace; font-size: 14px; font-weight: 700; color: var(--bg); background: var(--text); padding: 4px 10px; border: 2px solid var(--bg); animation: badgePop 0.4s cubic-bezier(.34,1.56,.64,1); letter-spacing: 1px; }
@keyframes badgePop { 0% { transform: scale(0.5) rotate(-10deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }

/* ── Exercise group & card ── */
.ex-group { background: var(--bg-card); border: 3px solid var(--border); transition: all 0.4s; box-shadow: 4px 4px 0 0 var(--border); }
.ex-group.group-done { border-color: var(--green-dim); box-shadow: 4px 4px 0 0 var(--green-dim); }
.ex-card { background: var(--bg-card); padding: 16px; border-bottom: 2px solid var(--border); transition: background 0.4s; animation: cardIn 0.25s ease both; }
.ex-card.ex-done { background: var(--green-bg); }
.ex-card:last-child { border-bottom: none; }
@keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.ex-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.ex-icon-btn { width: 48px; height: 48px; background: var(--purple-bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; text-decoration: none; border: 2px solid var(--purple); transition: all 0.15s; }
.ex-icon-btn:active { background: var(--purple); transform: translate(2px, 2px); }
.ex-main { flex: 1; min-width: 0; }
.ex-name-row { display: flex; align-items: center; gap: 8px; }
.ex-name { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; transition: color 0.3s; letter-spacing: 0.3px; }
.ex-card.ex-done .ex-name { color: var(--green); }
.video-btn { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; background: var(--bg); flex-shrink: 0; text-decoration: none; border: 2px solid var(--purple); transition: all 0.15s; }
.video-btn:active { background: var(--purple); transform: translate(2px, 2px); }
.ex-badge { flex-shrink: 0; display: flex; align-items: center; gap: 4px; background: var(--green); color: var(--bg); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 800; padding: 5px 10px; border: 2px solid var(--bg); white-space: nowrap; letter-spacing: 0.3px; }
.ex-badge.zero { background: var(--bg); color: var(--text-faint); border-color: var(--border); }

/* ── Sets ── */
.sets-list { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
.set-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; animation: setSlideIn 0.2s ease both; }
@keyframes setSlideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
.set-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint); width: 46px; flex-shrink: 0; font-weight: 700; letter-spacing: 0.5px; }

/* ── Check button ── */
.set-check { width: 40px; height: 40px; border: 3px solid var(--border); background: var(--bg); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; position: relative; overflow: visible; }
.set-check:active { transform: translate(2px, 2px); }
.set-check.done { background: var(--green); border-color: var(--green); animation: checkPop 0.35s cubic-bezier(.34,1.56,.64,1); }
@keyframes checkPop { 0% { transform: scale(0.6); } 60% { transform: scale(1.18); } 100% { transform: scale(1); } }
.set-check.done::after { content: ''; position: absolute; width: 60px; height: 60px; background: rgba(127,255,107,0.3); animation: ripple 0.5s ease-out forwards; pointer-events: none; }
@keyframes ripple { 0% { transform: scale(0.6); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }

/* ── Fields ── */
.set-fields { display: flex; gap: 8px; flex: 1; }
.field-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.field-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
.field-val { font-family: 'JetBrains Mono', monospace; font-size: 17px; color: var(--text); background: var(--bg); border: 2px solid var(--border); padding: 10px 8px; width: 100%; text-align: center; -moz-appearance: textfield; font-weight: 700; cursor: text; transition: all 0.15s; min-height: 44px; }
.field-val::-webkit-outer-spin-button, .field-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.field-val:focus { outline: none; border-color: var(--green); background: var(--green-bg); color: var(--green); }

/* ── Progress bar ── */
.ex-progress { margin-top: 12px; height: 8px; background: var(--bg); border: 2px solid var(--border); overflow: hidden; }
.ex-progress-fill { height: 100%; background: var(--green); transition: width 0.5s cubic-bezier(.34,1.2,.64,1); }

/* ── Complete banner ── */
.ex-completed-banner { margin-top: 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--green); font-weight: 700; display: flex; align-items: center; gap: 6px; animation: bannerSlide 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; }
@keyframes bannerSlide { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* ── Full workout complete banner ── */
.workout-complete-banner { margin: 0 0 16px; padding: 18px; background: var(--green); border: 3px solid var(--green); display: flex; align-items: center; gap: 16px; animation: bannerSlide 0.4s cubic-bezier(.34,1.2,.64,1); box-shadow: 4px 4px 0 0 var(--green-dim); }
.wc-icon { font-size: 32px; flex-shrink: 0; animation: trophyBounce 0.6s 0.2s cubic-bezier(.34,1.56,.64,1) both; line-height: 1; }
@keyframes trophyBounce { 0% { transform: scale(0) rotate(-15deg); } 70% { transform: scale(1.15) rotate(5deg); } 100% { transform: scale(1) rotate(0); } }
.wc-text { flex: 1; }
.wc-title { font-family: 'Pixelify Sans', monospace; font-size: 22px; font-weight: 700; color: var(--bg); letter-spacing: 1px; text-transform: uppercase; line-height: 1; }
.wc-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: rgba(0,0,0,0.7); margin-top: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Actions ── */
.actions { padding: 24px 16px 0; display: flex; flex-direction: column; gap: 12px; }
.btn { width: 100%; padding: 18px; border: 3px solid; font-family: 'Pixelify Sans', monospace; font-size: 20px; font-weight: 700; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; min-height: 56px; letter-spacing: 1.5px; text-transform: uppercase; line-height: 1; }
.btn:active { transform: translate(3px, 3px); box-shadow: none !important; }
.btn-primary { background: var(--green); color: var(--bg); border-color: var(--green); box-shadow: 5px 5px 0 0 var(--green-dim); }
.btn-success { background: var(--green); color: var(--bg); border-color: var(--green); box-shadow: 5px 5px 0 0 var(--green-dim); animation: successPulse 0.4s ease; }
@keyframes successPulse { 0%,100% { box-shadow: 5px 5px 0 0 var(--green-dim); } 50% { box-shadow: 5px 5px 0 0 var(--green-dim), 0 0 0 8px rgba(127,255,107,0.3); } }
.btn-danger { background: var(--bg); color: var(--danger); border-color: var(--danger); box-shadow: 5px 5px 0 0 #5a0a0a; }
.btn-ghost { background: var(--bg-card); color: var(--text-muted); border-color: var(--border); box-shadow: 5px 5px 0 0 var(--border); }
.btn-purple { background: var(--purple); color: var(--text); border-color: var(--purple); box-shadow: 5px 5px 0 0 var(--purple-dim); }

/* ── Session banner ── */
.session-banner { margin: 0 0 12px; padding: 12px 14px; background: var(--purple-bg); border: 3px solid var(--purple); font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--purple-light); display: flex; align-items: center; gap: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; box-shadow: 4px 4px 0 0 var(--purple-dim); }
.pulse-dot { width: 10px; height: 10px; animation: pulse 1.5s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ── Modal ── */
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
.modal-backdrop.open { display: flex; }
.modal { background: var(--bg-card); border-top: 3px solid var(--green); padding: 28px 20px max(28px, env(safe-area-inset-bottom)); width: 100%; animation: modalUp 0.3s cubic-bezier(.34,1.2,.64,1); }
@keyframes modalUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-icon { display: flex; justify-content: center; margin-bottom: 14px; font-size: 38px; line-height: 1; }
.modal h3 { font-family: 'Pixelify Sans', monospace; font-size: 22px; font-weight: 700; margin-bottom: 10px; text-align: center; letter-spacing: 1px; text-transform: uppercase; }
.modal p { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; text-align: center; }
.modal-actions { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="jb-logo">
      <div class="jb-logo-icon">
        <svg class="icon" width="30" height="30" viewBox="0 0 24 24">
          <rect x="2"  y="3"  width="3" height="3" fill="#7FFF6B"/>
          <rect x="2"  y="6"  width="3" height="3" fill="#7FFF6B"/>

          <rect x="16" y="15" width="3" height="3" fill="#7FFF6B"/>
          <rect x="16" y="18" width="3" height="3" fill="#7FFF6B"/>
          <rect x="19" y="3"  width="3" height="3" fill="#7FFF6B"/>
          <rect x="19" y="6"  width="3" height="3" fill="#7FFF6B"/>

      <svg class="icon" width="22" height="22" viewBox="0 0 24 24" fill="none">

    <p id="modal-body"></p>

</div>

<script>
// All icons drawn as pixelated rectangles for the retro aesthetic
const ICONS = {
  barbell:      `<svg class="icon" width="28" height="28" viewBox="0 0 24 24"><rect x="2" y="11" width="20" height="2" fill="#7FFF6B"/><rect x="1" y="8" width="3" height="8" fill="#7FFF6B"/><rect x="20" y="8" width="3" height="8" fill="#7FFF6B"/><rect x="0" y="10" width="2" height="4" fill="#7FFF6B"/><rect x="22" y="10" width="2" height="4" fill="#7FFF6B"/></svg>`,

const KEY  = 'jb_workout_v5';
const load = () => { try { return JSON.parse(localStorage.getItem(KEY)||'{}'); } catch(e) { return {}; } };
const save = () => { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {} };

let state = load();
if (!state.currentDay) state.currentDay = 1;
if (!state.weights)    state.weights    = {};
if (!state.session)    state.session    = null;

let activeDay = state.currentDay;

const getW      = (id, def) => state.weights[id] !== undefined ? state.weights[id] : def;
const getInc    = (id, def) => getW(id, def) - def;
const vidUrl    = name => `https://www.youtube.com/results?search_query=${encodeURIComponent(name+' exercise proper form')}`;
const flatten   = w => w.groups.flatMap(g => g.exercises);
const initSess  = idx => flatten(WORKOUTS[idx]).map(ex => ({
  exId: ex.id,
  sets: Array.from({length: ex.sets}, () => ({reps: ex.reps, weight: getW(ex.id, ex.weight), done: false}))
}));
const getSess    = () => (state.session && state.session.dayIndex === activeDay-1) ? state.session.data : null;
const sessActive = () => state.session !== null;
const buildIdx   = idx => { const m={}; flatten(WORKOUTS[idx]).forEach((ex,i)=>m[ex.id]=i); return m; };

function render() { renderTabs(); renderMeta(); renderSections(); renderButtons(); }

function renderTabs() {
  document.getElementById('day-tabs').innerHTML = WORKOUTS.map(w =>
    `<button class="day-tab ${w.day===activeDay?'active':''}" onclick="switchDay(${w.day})">${w.label}</button>`
  ).join('');
  const lbl = document.getElementById('today-label');
  lbl.innerHTML = activeDay === state.currentDay
    ? `${ICONS.today} » Today's workout`
    : `${ICONS.calendar} » Previewing ${WORKOUTS[activeDay-1].label}`;
}

function renderMeta() {
  const w = WORKOUTS[activeDay-1];
  document.getElementById('day-meta').innerHTML = `
    <span class="day-meta-item">${ICONS.bbsmall} ${flatten(w).length} exercises</span>
    <span class="day-meta-item">${ICONS.time} ${w.est} min</span>
  `;
}

function renderSections() {
  const w      = WORKOUTS[activeDay-1];
  const sess   = getSess();
  const exIdx  = buildIdx(activeDay-1);
  const allFlat = flatten(w);
  const workoutAllDone = sess && allFlat.every((ex,ei) => sess[ei].sets.every(s=>s.done));

  let bannerHtml = '';
  if (workoutAllDone) {
    bannerHtml = `
      <div class="workout-complete-banner">
        <div class="wc-icon">${ICONS.trophy}</div>
        <div class="wc-text">
          <div class="wc-title">Workout Complete!</div>
          <div class="wc-sub">All sets done · Tap finish to save</div>
        </div>
      </div>`;
  } else if (sessActive() && state.session.dayIndex === activeDay-1) {
    bannerHtml = `<div class="session-banner"><div class="pulse-dot" style="background:var(--purple-light);"></div>Workout in progress</div>`;
  } else if (sessActive()) {
    bannerHtml = `<div class="session-banner" style="background:#2a1a05;border-color:#fbbf24;color:#fbbf24;"><div class="pulse-dot" style="background:#fbbf24;"></div>Active: ${WORKOUTS[state.session.dayIndex].label}</div>`;
  }

  const sectionsHtml = w.groups.map(group => {
    const groupDone = sess && group.exercises.every(ex => {
      const ei = exIdx[ex.id];
      return sess[ei].sets.every(s => s.done);
    });

    const headerHtml = `
      <div class="equipment-header ${groupDone?'group-done':''}">
        <div class="equip-label">
          <div class="equip-name">› ${group.label}</div>
          <div class="equip-count">${group.exercises.length} exercise${group.exercises.length>1?'s':''}</div>
        </div>
        ${groupDone ? `<div class="equip-done-badge">DONE</div>` : ''}
      </div>`;

    const exercisesHtml = group.exercises.map((ex, delay) => {
      const ei         = exIdx[ex.id];
      const curW       = getW(ex.id, ex.weight);
      const inc        = getInc(ex.id, ex.weight);
      const isBW       = ex.unit === 'BW';
      const badgeLabel = isBW ? 'BW' : (inc > 0 ? `+${inc}LBS` : `${curW}LBS`);
      const badgeIcon  = inc > 0 ? `<span style="display:inline-block;color:#0a0a0a;">${ICONS.trendUp}</span>` : '';

      let setsHtml = '';
      if (sess) {
        const exS       = sess[ei];
        const doneCount = exS.sets.filter(s => s.done).length;
        const pct       = (doneCount / exS.sets.length) * 100;
        const exDone    = doneCount === exS.sets.length;
        setsHtml = `
          <div class="sets-list">
            ${exS.sets.map((s, si) => `
              <div class="set-row" style="animation-delay:${si*40}ms">
                <span class="set-num">SET ${si+1}</span>
                <div class="set-check ${s.done?'done':''}" data-ei="${ei}" onclick="toggleSet(${ei},${si})">
                  ${s.done ? ICONS.check : ''}
                </div>
                <div class="set-fields">
                  <div class="field-wrap">
                    <div class="field-label">Reps</div>
                    <input class="field-val" type="number" inputmode="numeric" value="${s.reps}" onfocus="this.select()" onchange="updateSet(${ei},${si},'reps',this.value)">
                  </div>
                  <div class="field-wrap">
                    <div class="field-label">${isBW?'':'Weight'}</div>
                    <input class="field-val" type="number" inputmode="decimal" value="${isBW?'':s.weight}" ${isBW?'placeholder="BW" disabled':''} onfocus="this.select()" onchange="updateSet(${ei},${si},'weight',this.value)">
                  </div>
                </div>
              </div>`).join('')}
          </div>
          <div class="ex-progress"><div class="ex-progress-fill" data-ei="${ei}" style="width:${pct}%"></div></div>
          ${exDone ? `<div class="ex-completed-banner">${ICONS.checkSm} Complete · +5lbs next session</div>` : ''}
        `;
      } else {
        setsHtml = `<div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-faint);margin-top:6px;margin-left:60px;font-weight:600;letter-spacing:0.5px;">${ex.sets} × ${ex.reps}${!isBW?` @ ${curW}LBS`:''}</div>`;
      }

      const exDoneClass = sess && sess[ei].sets.every(s=>s.done) ? 'ex-done' : '';
      return `
        <div class="ex-card ${exDoneClass}" data-ei="${ei}" style="animation-delay:${delay*60}ms">
          <div class="ex-header">
            <a class="ex-icon-btn" href="${vidUrl(ex.name)}" target="_blank" rel="noopener">${ICONS[ex.icon]}</a>
            <div class="ex-main">
              <div class="ex-name-row">
                <span class="ex-name">${ex.name}</span>
                <a class="video-btn" href="${vidUrl(ex.name)}" target="_blank" rel="noopener">${ICONS.play}</a>
              </div>
            </div>
            <div class="ex-badge ${isBW?'zero':''}">${badgeIcon}${badgeLabel}</div>
          </div>
          ${setsHtml}
        </div>`;
    }).join('');

    return `${headerHtml}<div class="ex-group ${groupDone?'group-done':''}">${exercisesHtml}</div>`;
  }).join('');

  document.getElementById('workout-sections').innerHTML = bannerHtml + sectionsHtml;
}

function renderButtons() {
  const sess = getSess();
  const c    = document.getElementById('actions');
  if (!sess && !sessActive()) {
    c.innerHTML = `<button class="btn btn-primary" onclick="startWorkout()">${ICONS.playLg} Start Workout</button>`;
  } else if (!sess && sessActive()) {
    c.innerHTML = `<button class="btn btn-purple" onclick="switchDay(${state.session.dayIndex+1})">${ICONS.back} Resume ${WORKOUTS[state.session.dayIndex].label}</button>`;
  } else {
    const allDone = state.session.data.every(ex => ex.sets.every(s => s.done));
    c.innerHTML = `
      <button class="btn ${allDone?'btn-success':'btn-primary'}" onclick="confirmFinish()">
        ${allDone ? ICONS.checkSm : ICONS.flag}
        ${allDone ? 'Finish & Next Day' : 'Finish Workout'}
      </button>
      <button class="btn btn-danger" onclick="confirmEndEarly()">${ICONS.closeX} End Early</button>
    `;
  }
}

function switchDay(day) { activeDay = day; render(); }

function startWorkout() {
  if (sessActive()) return;
  state.session = {dayIndex: activeDay-1, data: initSess(activeDay-1), startedAt: Date.now()};
  save(); render();
}

function toggleSet(ei, si) {
  const s = getSess(); if (!s) return;
  s[ei].sets[si].done = !s[ei].sets[si].done;
  save();
  updateAfterSetToggle(ei);
}

// Targeted DOM update: avoids full re-render so entrance animations don't replay
function updateAfterSetToggle(ei) {
  const sess  = getSess(); if (!sess) return;
  const w     = WORKOUTS[activeDay-1];
  const flat  = flatten(w);
  const exIdx = buildIdx(activeDay-1);
  const ex    = flat[ei];

  // 1. Update the specific check button
  const checks = document.querySelectorAll(`.set-check[data-ei="${ei}"]`);
  checks.forEach((el, si) => {
    const isDone = sess[ei].sets[si].done;
    if (isDone && !el.classList.contains('done')) {
      el.classList.add('done');
      el.innerHTML = ICONS.check;
    } else if (!isDone && el.classList.contains('done')) {
      el.classList.remove('done');
      el.innerHTML = '';
    }
  });

  // 2. Update the progress bar for this exercise
  const exS       = sess[ei];
  const doneCount = exS.sets.filter(s => s.done).length;
  const pct       = (doneCount / exS.sets.length) * 100;
  const exDone    = doneCount === exS.sets.length;
  const fill = document.querySelector(`.ex-progress-fill[data-ei="${ei}"]`);
  if (fill) fill.style.width = `${pct}%`;

  // 3. Update the exercise card "done" tint and complete banner
  const card = document.querySelector(`.ex-card[data-ei="${ei}"]`);
  if (card) {
    card.classList.toggle('ex-done', exDone);
    let banner = card.querySelector('.ex-completed-banner');
    if (exDone && !banner) {
      banner = document.createElement('div');
      banner.className = 'ex-completed-banner';
      banner.innerHTML = `${ICONS.checkSm} Complete · +5lbs next session`;
      card.appendChild(banner);
    } else if (!exDone && banner) {
      banner.remove();
    }
  }

  // 4. Update group "done" state (find which group this exercise belongs to)
  let groupIdx = -1;
  let runningI = 0;
  w.groups.forEach((g, gi) => {
    if (ei >= runningI && ei < runningI + g.exercises.length) groupIdx = gi;
    runningI += g.exercises.length;
  });
  if (groupIdx !== -1) {
    const group = w.groups[groupIdx];
    const groupDone = group.exercises.every(e => {
      const eei = exIdx[e.id];
      return sess[eei].sets.every(s => s.done);
    });
    const headers = document.querySelectorAll('.equipment-header');
    const groups  = document.querySelectorAll('.ex-group');
    const header  = headers[groupIdx];
    const grp     = groups[groupIdx];
    if (header) {
      header.classList.toggle('group-done', groupDone);
      const existingBadge = header.querySelector('.equip-done-badge');
      if (groupDone && !existingBadge) {
        const badge = document.createElement('div');
        badge.className = 'equip-done-badge';
        badge.textContent = 'DONE';
        header.appendChild(badge);
      } else if (!groupDone && existingBadge) {
        existingBadge.remove();
      }
    }
    if (grp) grp.classList.toggle('group-done', groupDone);
  }

  // 5. Update full-workout-complete banner & action buttons
  const allDone = flat.every((e, i) => sess[i].sets.every(s => s.done));
  const sectionsEl = document.getElementById('workout-sections');
  let wcBanner = sectionsEl.querySelector('.workout-complete-banner');
  let sBanner  = sectionsEl.querySelector('.session-banner');
  if (allDone) {
    if (sBanner) sBanner.remove();
    if (!wcBanner) {
      const tmp = document.createElement('div');
      tmp.innerHTML = `
        <div class="workout-complete-banner">
          <div class="wc-icon">${ICONS.trophy}</div>
          <div class="wc-text">
            <div class="wc-title">Workout Complete!</div>
            <div class="wc-sub">All sets done · Tap finish to save</div>
          </div>
        </div>`;
      sectionsEl.insertBefore(tmp.firstElementChild, sectionsEl.firstChild);
    }
  } else {
    if (wcBanner) wcBanner.remove();
    if (!sBanner && sessActive() && state.session.dayIndex === activeDay-1) {
      const tmp = document.createElement('div');
      tmp.innerHTML = `<div class="session-banner"><div class="pulse-dot" style="background:var(--purple-light);"></div>Workout in progress</div>`;
      sectionsEl.insertBefore(tmp.firstElementChild, sectionsEl.firstChild);
    }
  }
  renderButtons();
}

function updateSet(ei, si, field, val) {
  const s = getSess(); if (!s) return;
  s[ei].sets[si][field] = parseFloat(val) || 0;
  save();
}

function confirmFinish() {
  const sess = getSess(); if (!sess) return;
  const w      = WORKOUTS[activeDay-1];
  const flat   = flatten(w);
  const bumped = flat.filter((ex,ei) => sess[ei].sets.every(s=>s.done) && ex.unit!=='BW').map(ex=>ex.name);
  const msg    = bumped.length > 0
    ? `+5lbs applied next session: ${bumped.join(', ')}.`
    : 'No exercises fully completed — no weight increases this time.';
  openModal({
    icon: ICONS.trophy,
    title: 'Finish Workout?',
    body: `${msg} You'll advance to ${WORKOUTS[activeDay%4].label} next.`,
    actions: [
      {label:'Finish & Save', cls:'btn-success', icon: ICONS.checkSm, fn: finishWorkout},
      {label:'Cancel',        cls:'btn-ghost',   icon: ICONS.back,    fn: closeModal}
    ]
  });
}

function finishWorkout() {
  const sess = getSess(); if (!sess) return closeModal();
  const flat = flatten(WORKOUTS[activeDay-1]);
  flat.forEach((ex, ei) => {
    if (sess[ei].sets.every(s=>s.done) && ex.unit!=='BW')
      state.weights[ex.id] = getW(ex.id, ex.weight) + 5;
  });
  state.session    = null;
  state.currentDay = (activeDay % 4) + 1;
  activeDay        = state.currentDay;
  save(); closeModal(); render();
}

function confirmEndEarly() {
  openModal({
    icon: ICONS.warn,
    title: 'End Workout Early?',
    body: 'This session will be discarded. No weights will increase and you will stay on the same day.',
    actions: [
      {label:'Yes, End Workout', cls:'btn-danger', icon: ICONS.closeX, fn: endEarly},
      {label:'Keep Going',       cls:'btn-ghost',  icon: ICONS.back,   fn: closeModal}
    ]
  });
}

function endEarly() { state.session = null; save(); closeModal(); render(); }

function openReset() {
  openModal({
    icon: ICONS.reset,
    title: 'Reset All Progress?',
    body: 'All weight increases will be cleared and every exercise returns to its original starting weight. This cannot be undone.',
    actions: [
      {label:'Reset Everything', cls:'btn-danger', icon: ICONS.trash, fn: resetAll},
      {label:'Cancel',           cls:'btn-ghost',  icon: ICONS.back,  fn: closeModal}
    ]
  });
}

function resetAll() {
  state = {currentDay:1, weights:{}, session:null};
  activeDay = 1;
  save(); closeModal(); render();
}

function openModal({icon, title, body, actions}) {
  document.getElementById('modal-icon').innerHTML    = icon || '';
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = body;
  const c = document.getElementById('modal-actions');
  c.innerHTML = '';
  actions.forEach(a => {
    const b = document.createElement('button');
    b.className = `btn ${a.cls}`;
    b.innerHTML = `${a.icon}${a.label}`;
    b.onclick   = a.fn;
    c.appendChild(b);
  });
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target.id==='modal') closeModal(); });

render();
</script>
</body>
</html>
